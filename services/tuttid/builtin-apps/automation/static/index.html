<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Automation</title>
    <script>
      (() => {
        const systemTheme = window.matchMedia?.("(prefers-color-scheme: dark)")
          .matches
          ? "dark"
          : "light";
        document.documentElement.dataset.theme = systemTheme;
        document.documentElement.dataset.themeSource = "system";
        document.documentElement.style.colorScheme = systemTheme;
      })();
    </script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div id="appTitleBlock">
          <div class="app-title-row">
            <h1 id="appTitle">Automations</h1>
            <button
              id="detailInfoButton"
              class="ui-button ui-button-ghost ui-button-icon-sm detail-info-button hidden"
              type="button"
              data-slot="button"
              data-variant="ghost"
              data-size="icon-sm"
              aria-controls="statusSection"
              aria-expanded="false"
              aria-haspopup="dialog"
            >
              <span data-icon="info" aria-hidden="true"></span>
            </button>
          </div>
          <p id="detailPrompt" class="detail-prompt hidden"></p>
        </div>
        <button
          id="createButton"
          class="primary-action"
          type="button"
          data-slot="button"
          data-variant="default"
          data-size="default"
        >
          <span data-icon="create-filled-icon" aria-hidden="true"></span>
          Create
        </button>
        <div id="detailActions" class="detail-actions hidden">
          <button
            id="deleteButton"
            class="ui-button ui-button-ghost ui-button-dialog ui-button-danger-ghost"
            type="button"
            data-slot="button"
            data-variant="ghost"
            data-size="dialog"
          >
            <span data-icon="trash" aria-hidden="true"></span>
            Delete
          </button>
          <button
            id="runButton"
            class="ui-button ui-button-ghost ui-button-dialog"
            type="button"
            data-slot="button"
            data-variant="ghost"
            data-size="dialog"
          >
            <span data-icon="launch-lined" aria-hidden="true"></span>
            Run now
          </button>
        </div>
        <button
          id="headerEditButton"
          class="primary-action hidden"
          type="button"
        >
          <span data-icon="pencil" aria-hidden="true"></span>
          Edit
        </button>
      </header>

      <section class="automation-surface" aria-label="Automations">
        <div id="automationList" class="automation-list"></div>
      </section>

      <section
        id="inboxView"
        class="inbox-surface hidden"
        aria-label="Automation inbox"
      >
        <div
          id="inboxFilters"
          class="inbox-tabs"
          data-slot="underline-tabs"
          role="tablist"
          aria-label="Result status"
        ></div>
        <div class="tsh-custom-scroll-area run-inbox-scroll-area">
          <div id="runInbox" class="run-inbox"></div>
          <div
            class="tsh-custom-scrollbar run-inbox-scrollbar"
            data-custom-scrollbar
            data-scroll-target="runInbox"
            aria-hidden="true"
          >
            <div
              class="tsh-custom-scrollbar__thumb"
              data-custom-scrollbar-thumb
            ></div>
          </div>
        </div>
        <aside
          id="statusSection"
          class="status-section detail-status-sidebar hidden"
          aria-label="Automation status"
        >
          <span class="status-label">Status</span>
          <div class="status-pill">
            <span
              id="statusDot"
              class="status-dot"
              data-slot="status-dot"
              data-size="sm"
              aria-hidden="true"
            ></span>
            <span id="statusText">Active</span>
          </div>
          <div class="status-metrics">
            <div>
              <span>Schedule</span>
              <strong id="detailScheduleText">Manual</strong>
            </div>
            <div>
              <span>Next run</span>
              <strong id="nextRunText">Not scheduled</strong>
            </div>
            <div>
              <span>Last ran</span>
              <strong id="lastRunText">Never</strong>
            </div>
            <div id="detailProviderMetric">
              <span>Provider</span>
              <strong id="detailProviderText">Codex</strong>
            </div>
            <div id="detailModelMetric">
              <span>Model</span>
              <strong id="detailModelText">Default</strong>
            </div>
            <div id="detailReasoningMetric">
              <span>Reasoning</span>
              <strong id="detailReasoningText">Default</strong>
            </div>
            <div id="detailReviewMetric">
              <span>Review</span>
              <strong id="detailReviewText">Default</strong>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <div
      id="configDialog"
      class="dialog-backdrop hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="configDialogTitle"
    >
      <section class="config-dialog">
        <button
          id="closeConfigButton"
          class="ui-button ui-button-ghost ui-button-icon-sm dialog-close-button"
          type="button"
          data-slot="button"
          data-variant="ghost"
          data-size="icon-sm"
          aria-label="Close"
        >
          <span data-icon="x" aria-hidden="true"></span>
        </button>
        <aside class="template-panel" aria-label="Automation templates">
          <div class="template-panel-header">
            <h2>Templates</h2>
          </div>
          <div class="tsh-custom-scroll-area template-scroll-area">
            <div id="templateGrid" class="template-list"></div>
            <button
              id="templateScrollLeftButton"
              class="template-scroll-button template-scroll-button-left"
              type="button"
              data-template-scroll="left"
              data-visible="false"
              disabled
            >
              <span data-icon="chevron-left" aria-hidden="true"></span>
            </button>
            <button
              id="templateScrollRightButton"
              class="template-scroll-button template-scroll-button-right"
              type="button"
              data-template-scroll="right"
              data-visible="false"
              disabled
            >
              <span data-icon="chevron-right" aria-hidden="true"></span>
            </button>
            <div
              class="tsh-custom-scrollbar template-scrollbar"
              data-custom-scrollbar
              data-scroll-target="templateGrid"
              aria-hidden="true"
            >
              <div
                class="tsh-custom-scrollbar__thumb"
                data-custom-scrollbar-thumb
              ></div>
            </div>
          </div>
        </aside>

        <section class="config-panel">
          <header class="config-header">
            <div>
              <h2 id="configDialogTitle">Automation</h2>
            </div>
          </header>

          <div id="errorBanner" class="error-banner hidden"></div>

          <div class="form-scroll">
            <div class="tsh-custom-scroll-area config-form-scroll-area">
              <div id="configFormFields" class="config-form-fields">
                <label class="field">
                  <span>Title</span>
                  <input
                    id="nameInput"
                    class="title-input"
                    autocomplete="off"
                    placeholder="Automation title"
                  />
                </label>

                <label class="field">
                  <span>Prompt</span>
                  <textarea
                    id="promptInput"
                    class="prompt-input"
                    rows="4"
                    placeholder="Add prompt e.g. look for crashes in $sentry"
                  ></textarea>
                </label>

                <div class="config-toolbar">
                  <div
                    id="cwdSelectField"
                    class="dropdown-menu-field cwd-menu-field"
                    data-slot="dropdown-menu"
                  >
                    <button
                      id="cwdMenuTrigger"
                      class="inline-select-field dropdown-menu-trigger"
                      type="button"
                      data-slot="dropdown-menu-trigger"
                      aria-label="Working directory"
                      aria-haspopup="menu"
                      aria-expanded="false"
                    >
                      <span data-icon="folder" aria-hidden="true"></span>
                      <span
                        id="cwdMenuLabel"
                        class="dropdown-menu-trigger-label"
                      ></span>
                      <span data-icon="chevron-down" aria-hidden="true"></span>
                    </button>
                    <div
                      id="cwdMenuContent"
                      class="t-dropdown dropdown-menu-content hidden"
                      data-slot="dropdown-menu-content"
                      role="menu"
                    ></div>
                  </div>
                  <input
                    id="cwdInput"
                    class="ui-input cwd-custom-input hidden"
                    type="text"
                    data-slot="input"
                    data-size="default"
                    data-variant="default"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="/path/to/worktree"
                  />

                  <span class="schedule-tool">
                    <button
                      id="scheduleButton"
                      class="tool-button"
                      type="button"
                      aria-expanded="false"
                      aria-controls="schedulePanel"
                    >
                      <span data-icon="clock" aria-hidden="true"></span>
                      <span id="scheduleLabel">Daily at 9:00 AM</span>
                      <span data-icon="chevron-down" aria-hidden="true"></span>
                    </button>
                  </span>

                  <div id="runnerOptionsGroup" class="runner-options hidden">
                    <span
                      id="providerSelectField"
                      class="dropdown-menu-field runner-select-tool"
                      data-slot="dropdown-menu"
                    >
                      <button
                        id="providerButton"
                        class="tool-button dropdown-menu-trigger runner-select-button"
                        type="button"
                        data-slot="dropdown-menu-trigger"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        aria-controls="providerMenuContent"
                      >
                        <span
                          id="providerButtonLabel"
                          class="runner-select-value"
                        ></span>
                        <span
                          data-icon="chevron-down"
                          aria-hidden="true"
                        ></span>
                      </button>
                      <div
                        id="providerMenuContent"
                        class="t-dropdown dropdown-menu-content runner-menu-content hidden"
                        data-slot="dropdown-menu-content"
                        role="menu"
                      ></div>
                    </span>
                    <span
                      id="modelSelectField"
                      class="dropdown-menu-field runner-select-tool"
                      data-slot="dropdown-menu"
                    >
                      <button
                        id="modelButton"
                        class="tool-button dropdown-menu-trigger runner-select-button"
                        type="button"
                        data-slot="dropdown-menu-trigger"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        aria-controls="modelMenuContent"
                      >
                        <span
                          id="modelButtonLabel"
                          class="runner-select-value"
                        ></span>
                        <span
                          data-icon="chevron-down"
                          aria-hidden="true"
                        ></span>
                      </button>
                      <div
                        id="modelMenuContent"
                        class="t-dropdown dropdown-menu-content runner-menu-content hidden"
                        data-slot="dropdown-menu-content"
                        role="menu"
                      ></div>
                    </span>
                    <span
                      id="reasoningField"
                      class="dropdown-menu-field runner-select-tool hidden"
                      data-slot="dropdown-menu"
                    >
                      <button
                        id="reasoningButton"
                        class="tool-button dropdown-menu-trigger runner-select-button"
                        type="button"
                        data-slot="dropdown-menu-trigger"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        aria-controls="reasoningMenuContent"
                      >
                        <span
                          id="reasoningButtonLabel"
                          class="runner-select-value"
                        ></span>
                        <span
                          data-icon="chevron-down"
                          aria-hidden="true"
                        ></span>
                      </button>
                      <div
                        id="reasoningMenuContent"
                        class="t-dropdown dropdown-menu-content runner-menu-content hidden"
                        data-slot="dropdown-menu-content"
                        role="menu"
                      ></div>
                    </span>
                    <span
                      id="reviewField"
                      class="dropdown-menu-field runner-select-tool hidden"
                      data-slot="dropdown-menu"
                    >
                      <button
                        id="reviewButton"
                        class="tool-button dropdown-menu-trigger runner-select-button"
                        type="button"
                        data-slot="dropdown-menu-trigger"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        aria-controls="reviewMenuContent"
                      >
                        <span
                          id="reviewButtonLabel"
                          class="runner-select-value"
                        ></span>
                        <span
                          data-icon="chevron-down"
                          aria-hidden="true"
                        ></span>
                      </button>
                      <div
                        id="reviewMenuContent"
                        class="t-dropdown dropdown-menu-content runner-menu-content hidden"
                        data-slot="dropdown-menu-content"
                        role="menu"
                      ></div>
                    </span>
                  </div>
                </div>

                <section
                  id="schedulePanel"
                  class="t-dropdown schedule-panel hidden"
                  data-slot="popover-content"
                  aria-label="Schedule"
                >
                  <div class="schedule-section">
                    <span class="schedule-section-label">Schedule</span>
                    <div
                      id="scheduleFrequencyOptions"
                      class="schedule-segments"
                      role="radiogroup"
                      aria-label="Schedule frequency"
                    ></div>
                  </div>
                  <label id="scheduleTimeControls" class="schedule-time-field">
                    <span class="schedule-section-label">Time</span>
                    <input
                      id="scheduleTimeInput"
                      type="text"
                      inputmode="numeric"
                      autocomplete="off"
                      maxlength="5"
                      pattern="[0-9]{2}:[0-9]{2}"
                      placeholder="09:00"
                      data-slot="input"
                    />
                  </label>
                  <div id="scheduleDayControls" class="schedule-section hidden">
                    <span class="schedule-section-label">Days</span>
                    <div
                      id="scheduleDayOptions"
                      class="schedule-day-grid"
                      role="group"
                      aria-label="Weekly days"
                    ></div>
                  </div>
                </section>
              </div>
              <div
                class="tsh-custom-scrollbar config-form-scrollbar"
                data-custom-scrollbar
                data-scroll-target="configFormFields"
                aria-hidden="true"
              >
                <div
                  class="tsh-custom-scrollbar__thumb"
                  data-custom-scrollbar-thumb
                ></div>
              </div>
            </div>
          </div>

          <footer class="config-footer">
            <div class="left-actions"></div>
            <div class="form-controls">
              <button
                id="cancelConfigButton"
                class="ui-button ui-button-ghost ui-button-dialog"
                type="button"
                data-slot="button"
                data-variant="ghost"
                data-size="dialog"
              >
                Cancel
              </button>
              <button
                id="saveButton"
                class="ui-button ui-button-default ui-button-dialog"
                type="button"
                data-slot="button"
                data-variant="default"
                data-size="dialog"
              >
                Create
              </button>
            </div>
          </footer>
        </section>
      </section>
    </div>

    <div
      id="deleteConfirmDialog"
      class="dialog-backdrop confirm-backdrop hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="deleteConfirmTitle"
    >
      <section class="confirm-dialog">
        <h2 id="deleteConfirmTitle">Delete automation?</h2>
        <p id="deleteConfirmMessage">
          This automation and its run history will be removed.
        </p>
        <div class="confirm-actions">
          <button
            id="cancelDeleteButton"
            class="ui-button ui-button-ghost ui-button-dialog"
            type="button"
            data-slot="button"
            data-variant="ghost"
            data-size="dialog"
          >
            Cancel
          </button>
          <button
            id="confirmDeleteButton"
            class="ui-button ui-button-destructive ui-button-dialog danger-submit"
            type="button"
            data-slot="button"
            data-variant="destructive"
            data-size="dialog"
          >
            Delete
          </button>
        </div>
      </section>
    </div>

    <script src="/assets/vendor/markdown-it.min.js"></script>
    <script src="/assets/vendor/purify.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
