version: "2"

run:
  relative-path-mode: gomod
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - nolintlint
    - staticcheck
    - unused
    - revive
  settings:
    revive:
      rules:
        - name: duplicated-imports
        - name: empty-block
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: file-length-limit
          arguments:
            - max: 800
              skip-comments: true
              skip-blank-lines: true
          exclude:
            - TEST
            - main.go
            - wiring.go
            - types/**
        - name: if-return
        - name: indent-error-flow
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
          arguments:
            - allow-regex: "^_"
        - name: unused-receiver
          arguments:
            - allow-regex: "^_"
        - name: useless-break
  exclusions:
    generated: lax
    warn-unused: false
    presets:
      - comments
      - common-false-positives
      - std-error-handling
